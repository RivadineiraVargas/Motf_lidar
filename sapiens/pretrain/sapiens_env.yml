name: sapiens_venv
channels:
  - nvidia/label/cuda-11.8.0  # Canal específico do CUDA que você usou
  - conda-forge
  - defaults
dependencies:
  # --- Pacotes Conda (Instalação via binários do sistema) ---
  - python=3.10
  - cuda
  - docutils=0.18.1
  - sphinx=6.1.3
  - myst-parser
  - sphinx-copybutton
  - sphinx-notfound-page
  - sphinx-tabs
  - sphinxcontrib-jquery
  - tabulate
  - pycocotools
  - transformers==4.36.2
  - requests
  - scikit-learn
  - einops
  - importlib-metadata
  - matplotlib
  - numpy
  - rich
  - coverage
  - interrogate
  - pytest
  - tensorboard
  - pip  # O pip é necessário para a seção abaixo

  # --- Pacotes PIP (Instalação via Python Package Index) ---
  - pip:
      # Define o repositório oficial do PyTorch para buscar versões CUDA
      - --extra-index-url https://download.pytorch.org/whl/cu118
      
      # Core PyTorch
      - torch==2.5.1
      - torchvision==0.20.1
      - torchaudio==2.5.1
      
      # Dependências Gerais
      - modelindex
      - git+https://github.com/mzr1996/pytorch_sphinx_theme.git#egg=pytorch_sphinx_theme
      - albumentations>=0.3.2
      - grad-cam>=1.3.7
      - mat4py
      - openmim
